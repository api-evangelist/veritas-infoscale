        state:
          type: string
          description: Current resource state
          enum:
            - ONLINE
            - OFFLINE
            - FAULTED
            - UNKNOWN
          example: ONLINE
        serviceGroup:
          type: string
          description: Parent service group
          example: oracle-sg
        system:
          type: string
          description: System where resource is running
          example: node01
        enabled:
          type: boolean
          description: Whether the resource is enabled
          example: true
        critical:
          type: boolean
          description: Whether the resource is critical to the group
          example: true
        attributes:
          type: object
          description: Resource-type-specific attributes
          additionalProperties: true
    ResourceCreate:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          description: Resource name
          example: new-ip-res
        type:
          type: string
          description: Resource type
          example: IP
        attributes:
          type: object
          description: Resource attributes
          additionalProperties: true
    ResourceCollection:
      type: object
      properties:
        resources:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
    System:

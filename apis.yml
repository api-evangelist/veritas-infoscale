  - aid: veritas-infoscale:operations-manager-api
    name: Veritas InfoScale Operations Manager API
    description: >-
      REST API for centralized monitoring and management of InfoScale
      environments. Provides meta, query, update, and operational endpoints for
      managing clusters, service groups, hosts, storage, and extended attributes
      across the entire InfoScale infrastructure.

  - aid: veritas-infoscale:vxvm-api
    name: Veritas Volume Manager API
    description: >-
      API for storage volume management, including volume creation, resizing,
      mirroring, and snapshot operations. Manages disk groups, plexes, subdisks,
      and provides advanced storage features like thin provisioning, data
      migration, and volume replication.

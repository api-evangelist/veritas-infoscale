  - aid: veritas-infoscale:vcs-api
    name: Veritas Cluster Server API
    description: >-
      API for managing VCS clusters, service groups, and resources within
      InfoScale. Provides operations for cluster node management, service group
      failover and failback, resource dependency configuration, and heartbeat
      monitoring.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg

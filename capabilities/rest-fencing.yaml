naftiko: 1.0.0-alpha2
info:
  label: Veritas InfoScale REST API — Fencing
  description: 'Veritas InfoScale REST API — Fencing. 1 operations. Lead operation: Veritas InfoScale Get Fencing Configuration.
    Self-contained Naftiko capability covering one Veritas Infoscale business surface.'
  tags:
  - Veritas Infoscale
  - Fencing
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VERITAS_INFOSCALE_API_KEY: VERITAS_INFOSCALE_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-fencing
    baseUri: https://{infoscale-server}:14149/api/v1
    description: Veritas InfoScale REST API — Fencing business capability. Self-contained, no shared references.
    resources:
    - name: clusters-clusterId-fencing
      path: /clusters/{clusterId}/fencing
      operations:
      - name: getfencingconfiguration
        method: GET
        description: Veritas InfoScale Get Fencing Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.VERITAS_INFOSCALE_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-fencing-rest
    port: 8080
    description: REST adapter for Veritas InfoScale REST API — Fencing. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/clusters/{clusterid}/fencing
      name: clusters-clusterid-fencing
      description: REST surface for clusters-clusterId-fencing.
      operations:
      - method: GET
        name: getfencingconfiguration
        description: Veritas InfoScale Get Fencing Configuration
        call: rest-fencing.getfencingconfiguration
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-fencing-mcp
    port: 9090
    transport: http
    description: MCP adapter for Veritas InfoScale REST API — Fencing. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: veritas-infoscale-get-fencing-configuration
      description: Veritas InfoScale Get Fencing Configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-fencing.getfencingconfiguration
      outputParameters:
      - type: object
        mapping: $.

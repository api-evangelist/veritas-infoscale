naftiko: "1.0.0-alpha1"

info:
  label: "Veritas InfoScale REST API"
  description: "REST API for managing InfoScale clusters, service groups, storage resources, and high availability configurations."
  tags:
    - Veritas InfoScale
    - Clustering
    - High Availability
    - Storage Management
    - Disaster Recovery
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      INFOSCALE_API_TOKEN: INFOSCALE_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: infoscale-rest
      baseUri: https://{infoscale-server}:14149/api/v1
      description: "Veritas InfoScale REST API"
      authentication:
        type: bearer
        token: "{{INFOSCALE_API_TOKEN}}"
      resources:
        - name: clusters
          path: /clusters
          description: "Manage clusters"
          operations:
            - name: list-clusters
              method: GET
              description: "List all clusters"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-cluster
              method: GET
              description: "Get cluster details"
              inputParameters:
                - name: clusterId
                  in: path
                  type: string
                  required: true
                  description: "Cluster identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: service-groups
          path: /clusters/{clusterId}/servicegroups
          description: "Manage service groups"
          operations:
            - name: list-service-groups
              method: GET
              description: "List all service groups in a cluster"
              inputParameters:
                - name: clusterId
                  in: path
                  type: string
                  required: true
                  description: "Cluster identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-service-group
              method: POST
              description: "Create a new service group"
              inputParameters:
                - name: clusterId
                  in: path
                  type: string
                  required: true
                  description: "Cluster identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  systemList: "{{tools.systemList}}"
            - name: get-service-group
              method: GET
              description: "Get service group details"
              inputParameters:
                - name: clusterId
                  in: path
                  type: string
                  required: true
                  description: "Cluster identifier"
                - name: serviceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Service group name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: online-service-group
              method: POST
              description: "Bring a service group online"
              inputParameters:
                - name: clusterId
                  in: path
                  type: string
                  required: true
                  description: "Cluster identifier"
                - name: serviceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Service group name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: offline-service-group
              method: POST
              description: "Take a service group offline"
              inputParameters:
                - name: clusterId
                  in: path
                  type: string
                  required: true
                  description: "Cluster identifier"
                - name: serviceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Service group name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: switch-service-group
              method: POST
              description: "Switch a service group to another system"
              inputParameters:
                - name: clusterId
                  in: path
                  type: string
                  required: true
                  description: "Cluster identifier"
                - name: serviceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Service group name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  targetSystem: "{{tools.targetSystem}}"
        - name: systems
          path: /clusters/{clusterId}/systems
          description: "Manage cluster nodes"
          operations:
            - name: list-systems
              method: GET
              description: "List all cluster nodes"
              inputParameters:
                - name: clusterId
                  in: path
                  type: string
                  required: true
                  description: "Cluster identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-system
              method: GET
              description: "Get cluster node details"
              inputParameters:
                - name: clusterId
                  in: path
                  type: string
                  required: true
                  description: "Cluster identifier"
                - name: systemName
                  in: path
                  type: string
                  required: true
                  description: "System hostname"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: disk-groups
          path: /diskgroups
          description: "Manage VxVM disk groups"
          operations:
            - name: list-disk-groups
              method: GET
              description: "List all disk groups"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-disk-group
              method: GET
              description: "Get disk group details"
              inputParameters:
                - name: diskGroupName
                  in: path
                  type: string
                  required: true
                  description: "Disk group name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-disk-group
              method: POST
              description: "Create a disk group"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  disks: "{{tools.disks}}"
        - name: volumes
          path: /diskgroups/{diskGroupName}/volumes
          description: "Manage storage volumes"
          operations:
            - name: list-volumes
              method: GET
              description: "List all volumes in a disk group"
              inputParameters:
                - name: diskGroupName
                  in: path
                  type: string
                  required: true
                  description: "Disk group name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-volume
              method: GET
              description: "Get volume details"
              inputParameters:
                - name: diskGroupName
                  in: path
                  type: string
                  required: true
                  description: "Disk group name"
                - name: volumeName
                  in: path
                  type: string
                  required: true
                  description: "Volume name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-volume
              method: POST
              description: "Create a volume"
              inputParameters:
                - name: diskGroupName
                  in: path
                  type: string
                  required: true
                  description: "Disk group name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  size: "{{tools.size}}"
            - name: resize-volume
              method: POST
              description: "Resize a volume"
              inputParameters:
                - name: diskGroupName
                  in: path
                  type: string
                  required: true
                  description: "Disk group name"
                - name: volumeName
                  in: path
                  type: string
                  required: true
                  description: "Volume name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  newSize: "{{tools.newSize}}"
            - name: create-snapshot
              method: POST
              description: "Create a volume snapshot"
              inputParameters:
                - name: diskGroupName
                  in: path
                  type: string
                  required: true
                  description: "Disk group name"
                - name: volumeName
                  in: path
                  type: string
                  required: true
                  description: "Volume name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: alerts
          path: /alerts
          description: "Manage cluster alerts"
          operations:
            - name: list-alerts
              method: GET
              description: "List all active alerts"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-alert
              method: GET
              description: "Get alert details"
              inputParameters:
                - name: alertId
                  in: path
                  type: string
                  required: true
                  description: "Alert identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: acknowledge-alert
              method: POST
              description: "Acknowledge an alert"
              inputParameters:
                - name: alertId
                  in: path
                  type: string
                  required: true
                  description: "Alert identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: infoscale-rest-api
      resources:
        - path: /v1/clusters
          name: clusters
          description: "Cluster management operations"
          operations:
            - method: GET
              name: list-clusters
              description: "List all clusters"
              call: "infoscale-rest.list-clusters"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/clusters/{clusterId}
          name: cluster-detail
          description: "Single cluster operations"
          operations:
            - method: GET
              name: get-cluster
              description: "Get cluster details"
              call: "infoscale-rest.get-cluster"
              with:
                clusterId: "rest.clusterId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/clusters/{clusterId}/servicegroups
          name: service-groups
          description: "Service group management"
          operations:
            - method: GET
              name: list-service-groups
              description: "List service groups"
              call: "infoscale-rest.list-service-groups"
              with:
                clusterId: "rest.clusterId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/diskgroups
          name: disk-groups
          description: "Disk group management"
          operations:
            - method: GET
              name: list-disk-groups
              description: "List disk groups"
              call: "infoscale-rest.list-disk-groups"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/alerts
          name: alerts
          description: "Alert management"
          operations:
            - method: GET
              name: list-alerts
              description: "List alerts"
              call: "infoscale-rest.list-alerts"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: infoscale-rest-mcp
      transport: http
      tools:
        - name: list-clusters
          description: "List all InfoScale clusters"
          hints:
            readOnly: true
            openWorld: true
          call: "infoscale-rest.list-clusters"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-cluster
          description: "Get details of a specific cluster"
          hints:
            readOnly: true
            idempotent: true
          call: "infoscale-rest.get-cluster"
          with:
            clusterId: "tools.clusterId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-service-groups
          description: "List service groups in a cluster"
          hints:
            readOnly: true
            idempotent: true
          call: "infoscale-rest.list-service-groups"
          with:
            clusterId: "tools.clusterId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-service-group
          description: "Get service group details"
          hints:
            readOnly: true
            idempotent: true
          call: "infoscale-rest.get-service-group"
          with:
            clusterId: "tools.clusterId"
            serviceGroupName: "tools.serviceGroupName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: online-service-group
          description: "Bring a service group online"
          hints:
            readOnly: false
          call: "infoscale-rest.online-service-group"
          with:
            clusterId: "tools.clusterId"
            serviceGroupName: "tools.serviceGroupName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: offline-service-group
          description: "Take a service group offline"
          hints:
            readOnly: false
          call: "infoscale-rest.offline-service-group"
          with:
            clusterId: "tools.clusterId"
            serviceGroupName: "tools.serviceGroupName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: switch-service-group
          description: "Switch a service group to another system"
          hints:
            readOnly: false
          call: "infoscale-rest.switch-service-group"
          with:
            clusterId: "tools.clusterId"
            serviceGroupName: "tools.serviceGroupName"
            targetSystem: "tools.targetSystem"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-systems
          description: "List all cluster nodes"
          hints:
            readOnly: true
          call: "infoscale-rest.list-systems"
          with:
            clusterId: "tools.clusterId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-disk-groups
          description: "List all VxVM disk groups"
          hints:
            readOnly: true
            openWorld: true
          call: "infoscale-rest.list-disk-groups"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-disk-group
          description: "Get disk group details"
          hints:
            readOnly: true
            idempotent: true
          call: "infoscale-rest.get-disk-group"
          with:
            diskGroupName: "tools.diskGroupName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-volumes
          description: "List volumes in a disk group"
          hints:
            readOnly: true
            idempotent: true
          call: "infoscale-rest.list-volumes"
          with:
            diskGroupName: "tools.diskGroupName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-volume
          description: "Create a new volume"
          hints:
            readOnly: false
          call: "infoscale-rest.create-volume"
          with:
            diskGroupName: "tools.diskGroupName"
            name: "tools.name"
            size: "tools.size"
          outputParameters:
            - type: object
              mapping: "$."
        - name: resize-volume
          description: "Resize a volume"
          hints:
            readOnly: false
          call: "infoscale-rest.resize-volume"
          with:
            diskGroupName: "tools.diskGroupName"
            volumeName: "tools.volumeName"
            newSize: "tools.newSize"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-snapshot
          description: "Create a volume snapshot"
          hints:
            readOnly: false
          call: "infoscale-rest.create-snapshot"
          with:
            diskGroupName: "tools.diskGroupName"
            volumeName: "tools.volumeName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-alerts
          description: "List all active cluster alerts"
          hints:
            readOnly: true
          call: "infoscale-rest.list-alerts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: acknowledge-alert
          description: "Acknowledge a cluster alert"
          hints:
            readOnly: false
          call: "infoscale-rest.acknowledge-alert"
          with:
            alertId: "tools.alertId"
          outputParameters:
            - type: object
              mapping: "$."

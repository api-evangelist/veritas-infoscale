naftiko: 1.0.0-alpha2
info:
  label: Veritas InfoScale REST API — Disks
  description: 'Veritas InfoScale REST API — Disks. 2 operations. Lead operation: Veritas InfoScale List Disks. Self-contained
    Naftiko capability covering one Veritas Infoscale business surface.'
  tags:
  - Veritas Infoscale
  - Disks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VERITAS_INFOSCALE_API_KEY: VERITAS_INFOSCALE_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-disks
    baseUri: https://{infoscale-server}:14149/api/v1
    description: Veritas InfoScale REST API — Disks business capability. Self-contained, no shared references.
    resources:
    - name: disks
      path: /disks
      operations:
      - name: listdisks
        method: GET
        description: Veritas InfoScale List Disks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: disks-diskName
      path: /disks/{diskName}
      operations:
      - name: getdisk
        method: GET
        description: Veritas InfoScale Get Disk
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.VERITAS_INFOSCALE_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-disks-rest
    port: 8080
    description: REST adapter for Veritas InfoScale REST API — Disks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/disks
      name: disks
      description: REST surface for disks.
      operations:
      - method: GET
        name: listdisks
        description: Veritas InfoScale List Disks
        call: rest-disks.listdisks
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/disks/{diskname}
      name: disks-diskname
      description: REST surface for disks-diskName.
      operations:
      - method: GET
        name: getdisk
        description: Veritas InfoScale Get Disk
        call: rest-disks.getdisk
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-disks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Veritas InfoScale REST API — Disks. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: veritas-infoscale-list-disks
      description: Veritas InfoScale List Disks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-disks.listdisks
      outputParameters:
      - type: object
        mapping: $.
    - name: veritas-infoscale-get-disk
      description: Veritas InfoScale Get Disk
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-disks.getdisk
      outputParameters:
      - type: object
        mapping: $.

meters:
  - name: software_license
    description: Annual InfoScale license line; sizing dimensions (nodes, sockets, capacity) negotiated
      in the order form.
    unit: varies
    aggregation: sum
principles:
  - name: Visibility
    description: Visibility into InfoScale usage is local to the customer's deployment via the InfoScale
      Operations Manager / CLI; there is no public cost API.
  - name: Allocation
    description: Allocation is per-cluster / per-node based on entitlement records held by the customer
      and validated by Veritas at audit time.
  - name: Optimization
    description: Optimization levers are right-sizing nodes / sockets at renewal and consolidating clusters
      to reduce entitlement count.
  - name: Accountability
    description: Accountability sits with the platform / infrastructure team that operates the InfoScale
      clusters; finance owns the annual subscription line.
